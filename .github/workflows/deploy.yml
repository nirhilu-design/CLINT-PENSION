name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Cloudflare secrets are present
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::Secret CLOUDFLARE_API_TOKEN is MISSING or empty. Add it under Settings -> Secrets and variables -> Actions -> Repository secrets (exact name, no leading/trailing spaces)."
            exit 1
          fi
          if [ -z "$CF_ACCOUNT" ]; then
            echo "::error::Secret CLOUDFLARE_ACCOUNT_ID is MISSING or empty. Add it under Settings -> Secrets and variables -> Actions -> Repository secrets."
            exit 1
          fi
          echo "CLOUDFLARE_API_TOKEN present (length ${#CF_TOKEN})"
          echo "CLOUDFLARE_ACCOUNT_ID present (length ${#CF_ACCOUNT})"

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          wranglerVersion: "4"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
